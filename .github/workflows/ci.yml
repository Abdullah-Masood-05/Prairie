name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun run test
      - name: Vite build
        run: bun run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: cargo test
        working-directory: src-tauri
        run: cargo test

  release:
    # Tag-triggered full bundle: produces the Windows installer and attaches
    # it to a GitHub Release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [frontend, rust]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - name: Place bisond sidecar
        # The engine binary is not built in this repo; the release expects it
        # checked in under src-tauri/bin/ (or provided via BISONDB_BUILD_DIR
        # by a preceding step in your environment).
        run: |
          if (-not (Test-Path "src-tauri/bin/bisond.exe")) {
            Write-Error "src-tauri/bin/bisond.exe missing - build BisonDB and run bun run copy-sidecar before tagging"
          }
      - name: Tauri build
        run: bun run tauri build
      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
